<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - GIIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy-dark: #0f172a;
            --navy: #1e293b;
            --navy-light: #334155;
            --purple: #7c3aed;
            --purple-light: #8b5cf6;
            --teal: #06b6d4;
            --teal-light: #22d3ee;
            --orange: #f97316;
            --orange-light: #fb923c;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-600: #475569;
            --gray-700: #334155;
            --gradient-primary: linear-gradient(135deg, #1e293b 0%, #7c3aed 100%);
            --gradient-hero: linear-gradient(135deg, #0f172a 0%, #4c1d95 50%, #7c3aed 100%);
            --gradient-teal: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%);
            --gradient-orange: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-700);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: var(--gradient-primary);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-lg);
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--teal-light);
        }

        .back-btn {
            background: transparent;
            border: 2px solid var(--teal-light);
            color: var(--teal-light);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--teal);
            color: var(--white);
        }

        /* Main Content */
        .main-content {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .feedback-card {
            background: var(--white);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--shadow-2xl);
        }

        .feedback-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .feedback-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--white);
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
        }

        .feedback-header h1 {
            font-size: 2rem;
            color: var(--navy-dark);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .feedback-header p {
            color: var(--gray-600);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--navy-dark);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-600);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group textarea {
            padding: 1rem;
            resize: vertical;
            min-height: 150px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .rating-container {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }

        .rating-star {
            font-size: 2.5rem;
            color: var(--gray-300);
            cursor: pointer;
            transition: all 0.3s;
        }

        .rating-star:hover,
        .rating-star.active {
            color: #fbbf24;
            transform: scale(1.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: var(--white);
            box-shadow: var(--shadow-lg);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            width: 100%;
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: var(--gray-200);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #34d399;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
        }

        .form-hint {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: 0.5rem;
        }

        @media (max-width: 640px) {
            .feedback-card {
                padding: 2rem 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-card {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo">
                <i class="fas fa-globe-americas"></i>
                GIIP
            </a>
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Dashboard
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="feedback-card">
            <div class="feedback-header">
                <div class="feedback-icon">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <h1>We Value Your Feedback</h1>
                <p>Help us improve GIIP by sharing your experience and suggestions</p>
            </div>

            <div id="feedbackAlert" class="alert"></div>

            <form onsubmit="handleFeedback(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Feedback Type</label>
                    <div class="input-wrapper">
                        <i class="fas fa-tag"></i>
                        <select id="feedbackType" required>
                            <option value="">Select feedback type</option>
                            <option value="bug">Bug Report</option>
                            <option value="feature">Feature Request</option>
                            <option value="improvement">Suggestion for Improvement</option>
                            <option value="general">General Feedback</option>
                            <option value="praise">Praise/Compliment</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Rate Your Experience</label>
                    <div class="rating-container" id="ratingContainer">
                        <span class="rating-star" data-rating="1"><i class="fas fa-star"></i></span>
                        <span class="rating-star" data-rating="2"><i class="fas fa-star"></i></span>
                        <span class="rating-star" data-rating="3"><i class="fas fa-star"></i></span>
                        <span class="rating-star" data-rating="4"><i class="fas fa-star"></i></span>
                        <span class="rating-star" data-rating="5"><i class="fas fa-star"></i></span>
                    </div>
                    <input type="hidden" id="rating" required>
                    <p class="form-hint" id="ratingText">Click to rate</p>
                </div>

                <div class="form-group">
                    <label>Your Feedback</label>
                    <textarea id="feedbackMessage" placeholder="Tell us about your experience, suggestions, or any issues you've encountered..." required></textarea>
                    <p class="form-hint">Please be as detailed as possible to help us understand your feedback better</p>
                </div>

                <div class="form-group">
                    <label>Would you like a response?</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope-open"></i>
                        <select id="responseNeeded">
                            <option value="no">No, just submitting feedback</option>
                            <option value="yes">Yes, please contact me</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i>
                        Submit Feedback
                    </button>
                    <a href="dashboard.html" class="btn btn-secondary">
                        <i class="fas fa-times"></i>
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const BASE_URL = "https://giip-project.onrender.com";

        function handleUnauthorized() {
            localStorage.removeItem('token');
            localStorage.removeItem('isLoggedIn');
            window.location.href = '../index.html';
        }

        window.onload = function() {
            loadUserData();
            initRating();
        };

        async function loadUserData() {
            const token = localStorage.getItem('token');
            if (!token) {
                handleUnauthorized();
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/api/auth/profile`, {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.message || 'Unable to load profile');
                }

                const user = data.user || {};
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user.name || '');
                localStorage.setItem('userEmail', user.email || '');

                document.getElementById('fullName').value = user.name || '';
                document.getElementById('email').value = user.email || '';
            } catch (error) {
                alert(error.message || 'Session expired. Please log in again.');
                handleUnauthorized();
            }
        }

        // Initialize rating stars
        function initRating() {
            const stars = document.querySelectorAll('.rating-star');
            const ratingInput = document.getElementById('rating');
            const ratingText = document.getElementById('ratingText');

            const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];

            stars.forEach(star => {
                star.addEventListener('click', function() {
                    const rating = this.getAttribute('data-rating');
                    ratingInput.value = rating;
                    ratingText.textContent = ratingLabels[rating];

                    // Update star colors
                    stars.forEach((s, index) => {
                        if (index < rating) {
                            s.classList.add('active');
                        } else {
                            s.classList.remove('active');
                        }
                    });
                });

                star.addEventListener('mouseenter', function() {
                    const rating = this.getAttribute('data-rating');
                    stars.forEach((s, index) => {
                        if (index < rating) {
                            s.style.color = '#fbbf24';
                        } else {
                            s.style.color = 'var(--gray-300)';
                        }
                    });
                });

                star.addEventListener('mouseleave', function() {
                    const currentRating = ratingInput.value;
                    stars.forEach((s, index) => {
                        if (index < currentRating) {
                            s.style.color = '#fbbf24';
                        } else {
                            s.style.color = 'var(--gray-300)';
                        }
                    });
                });
            });
        }

        // Handle feedback submission
        async function handleFeedback(event) {
            event.preventDefault();

            const feedbackType = document.getElementById('feedbackType').value;
            const rating = document.getElementById('rating').value;
            const feedbackMessage = document.getElementById('feedbackMessage').value.trim();
            const responseNeeded = document.getElementById('responseNeeded').value;
            const token = localStorage.getItem('token');

            if (!token) {
                handleUnauthorized();
                return;
            }

            // Validation
            if (!rating) {
                showAlert('Please rate your experience', 'error');
                return;
            }

            if (feedbackMessage.length < 10) {
                showAlert('Please provide more detailed feedback (at least 10 characters)', 'error');
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/api/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        category: feedbackType,
                        message: `Rating: ${rating}/5\nResponse needed: ${responseNeeded}\n\n${feedbackMessage}`
                    })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.message || 'Unable to submit feedback');
                }

                showAlert(data.message || 'Thank you for your feedback! We appreciate your input.', 'success');
                alert(data.message || 'Feedback submitted successfully');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } catch (error) {
                showAlert(error.message || 'Unable to submit feedback', 'error');
                alert(error.message || 'Unable to submit feedback');
                if ((error.message || '').toLowerCase().includes('unauthorized') || (error.message || '').toLowerCase().includes('token')) {
                    handleUnauthorized();
                }
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('feedbackAlert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userName');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('feedbacks');
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
